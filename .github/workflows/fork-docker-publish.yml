name: Fork Docker Publish

# Builds the server image from source and pushes it to this fork's GitHub
# Container Registry (ghcr.io/<owner>/server) on every push to master.
# Uses the built-in GITHUB_TOKEN — no extra secrets required.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: fork-docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute release id
        run: echo "RELEASE_ID=$(( ( $(date +%s) - $(date -d '2022-06-15' +%s) ) / 86400 ))" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/package/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP=sms-gateway
            APP_VERSION=${{ github.ref_name }}-${{ github.sha }}
            APP_RELEASE_ID=${{ env.RELEASE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
